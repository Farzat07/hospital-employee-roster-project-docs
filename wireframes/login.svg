<svg xmlns="http://www.w3.org/2000/svg" width="648" height="448" class="svgbob">
  <style>.svgbob line, .svgbob path, .svgbob circle, .svgbob rect, .svgbob polygon {
  stroke: black;
  stroke-width: 2;
  stroke-opacity: 1;
  fill-opacity: 1;
  stroke-linecap: round;
  stroke-linejoin: miter;
}

.svgbob text {
  white-space: pre;
  fill: black;
  font-family: Iosevka Fixed, monospace;
  font-size: 14px;
}

.svgbob rect.backdrop {
  stroke: none;
  fill: white;
}

.svgbob .broken {
  stroke-dasharray: 8;
}

.svgbob .filled {
  fill: black;
}

.svgbob .bg_filled {
  fill: white;
  stroke-width: 1;
}

.svgbob .nofill {
  fill: white;
}

.svgbob .end_marked_arrow {
  marker-end: url(#arrow);
}

.svgbob .start_marked_arrow {
  marker-start: url(#arrow);
}

.svgbob .end_marked_diamond {
  marker-end: url(#diamond);
}

.svgbob .start_marked_diamond {
  marker-start: url(#diamond);
}

.svgbob .end_marked_circle {
  marker-end: url(#circle);
}

.svgbob .start_marked_circle {
  marker-start: url(#circle);
}

.svgbob .end_marked_open_circle {
  marker-end: url(#open_circle);
}

.svgbob .start_marked_open_circle {
  marker-start: url(#open_circle);
}

.svgbob .end_marked_big_open_circle {
  marker-end: url(#big_open_circle);
}

.svgbob .start_marked_big_open_circle {
  marker-start: url(#big_open_circle);
}

</style>
  <defs>
    <marker id="arrow" viewBox="-2 -2 8 8" refX="4" refY="2" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0,0 0,4 4,2 0,0"></polygon>
    </marker>
    <marker id="diamond" viewBox="-2 -2 8 8" refX="4" refY="2" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0,2 2,0 4,2 2,4 0,2"></polygon>
    </marker>
    <marker id="circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <circle cx="4" cy="4" r="2" class="filled"></circle>
    </marker>
    <marker id="open_circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <circle cx="4" cy="4" r="2" class="bg_filled"></circle>
    </marker>
    <marker id="big_open_circle" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <circle cx="4" cy="4" r="3" class="bg_filled"></circle>
    </marker>
  </defs>
  <rect class="backdrop" x="0" y="0" width="648" height="448"></rect>
  <rect x="44" y="184" width="552" height="32" class="solid nofill" rx="0"></rect>
  <text x="66" y="204" >example@hospital.example.com</text>
  <rect x="44" y="264" width="552" height="32" class="solid nofill" rx="0"></rect>
  <text x="66" y="284" >******************</text>
  <rect x="220" y="328" width="192" height="32" class="solid nofill" rx="0"></rect>
  <text x="290" y="348" >SIGN</text>
  <text x="330" y="348" >IN</text>
  <text x="226" y="28" >HOSPITAL</text>
  <text x="298" y="28" >EMPLOYEE</text>
  <text x="370" y="28" >ROSTER</text>
  <text x="202" y="44" >Healthcare</text>
  <text x="290" y="44" >Scheduling</text>
  <text x="378" y="44" >Automation</text>
  <text x="290" y="124" >LOG</text>
  <text x="322" y="124" >IN</text>
  <text x="42" y="172" >Email</text>
  <text x="90" y="172" >Address</text>
  <text x="42" y="252" >Password</text>
  <text x="42" y="396" >[?]</text>
  <text x="74" y="396" >Forgot</text>
  <text x="130" y="396" >Password?</text>
  <text x="394" y="396" >Contact</text>
  <text x="458" y="396" >Administrator</text>
  <g>
    <line x1="4" y1="8" x2="636" y2="8" class="solid"></line>
    <line x1="4" y1="8" x2="4" y2="432" class="solid"></line>
    <line x1="636" y1="8" x2="636" y2="432" class="solid"></line>
    <line x1="4" y1="64" x2="636" y2="64" class="solid"></line>
    <line x1="4" y1="432" x2="636" y2="432" class="solid"></line>
  </g>
</svg>
